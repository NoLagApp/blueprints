name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all SDKs
        run: npm run build

      - name: Run all tests
        run: npm test

      - name: Typecheck all SDKs
        run: npm run typecheck

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install nolag-agents with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e python/agents
          pip install pytest pytest-asyncio

      - name: Run nolag-agents tests
        run: pytest python/agents/tests -q

      - name: Install nolag-signal with dev deps
        run: pip install -e python/signal

      - name: Run nolag-signal tests
        if: hashFiles('python/signal/tests/**') != ''
        run: pytest python/signal/tests -q
