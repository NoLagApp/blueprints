name: Publish SDKs to npm

on:
  # Trigger manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      sdk:
        description: 'SDK to publish (or "all" for all SDKs)'
        required: true
        default: all
        type: choice
        options:
          - all
          - chat
          - notify
          - signal
          - stream
          - feed
          - dash
          - track
          - sync
          - queue
          - iot
          - collab
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

  # Auto-publish when a version tag is pushed (e.g. v0.2.0)
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build all SDKs
        run: npm run build

      - name: Run all tests
        run: npm test

      - name: Determine SDKs to publish
        id: sdks
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SDK="${{ inputs.sdk }}"
          else
            SDK="all"
          fi

          if [ "$SDK" = "all" ]; then
            echo "packages=chat notify signal stream feed dash track sync queue iot collab" >> "$GITHUB_OUTPUT"
          else
            echo "packages=$SDK" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          BUMP="${{ inputs.bump }}"
          for pkg in ${{ steps.sdks.outputs.packages }}; do
            echo "Bumping @nolag/$pkg → $BUMP"
            cd js/$pkg
            npm version $BUMP --no-git-tag-version
            cd ../..
          done

      - name: Publish to npm (Trusted Publishing — no token needed)
        run: |
          for pkg in ${{ steps.sdks.outputs.packages }}; do
            echo "Publishing @nolag/$pkg..."
            cd js/$pkg

            # Check if this version is already published
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")

            if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
              echo "  ⏭ $PKG_NAME@$PKG_VERSION already published, skipping"
            else
              npm publish --provenance --access public
              echo "  ✓ $PKG_NAME@$PKG_VERSION published"
            fi

            cd ../..
          done

      - name: Commit version bumps (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/*/package.json
          git diff --cached --quiet || git commit -m "chore: bump SDK versions (${{ inputs.bump }})"
          git push
