name: Publish SDKs to npm

on:
  workflow_dispatch:
    inputs:
      sdk:
        description: 'SDK to publish (or "all" for all SDKs)'
        required: true
        default: all
        type: choice
        options:
          - all
          - chat
          - notify
          - signal
          - stream
          - feed
          - dash
          - track
          - sync
          - queue
          - iot
          - collab

  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build all SDKs
        run: npm run build

      - name: Run all tests
        run: npm test

      - name: Determine SDKs to publish
        id: sdks
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SDK="${{ inputs.sdk }}"
          else
            SDK="all"
          fi

          if [ "$SDK" = "all" ]; then
            echo "packages=chat notify signal stream feed dash track sync queue iot collab" >> "$GITHUB_OUTPUT"
          else
            echo "packages=$SDK" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in ${{ steps.sdks.outputs.packages }}; do
            echo "Publishing @nolag/$pkg..."
            cd js/$pkg

            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")

            if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
              echo "  ⏭ $PKG_NAME@$PKG_VERSION already published, skipping"
            else
              npm publish --provenance --access public
              echo "  ✓ $PKG_NAME@$PKG_VERSION published"
            fi

            cd ../..
          done
